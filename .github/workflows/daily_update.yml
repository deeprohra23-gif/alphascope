# DROP-IN REPLACEMENT for your existing .github/workflows/daily_update.yml
# (once stockradar-web/ lives inside the StockRadar-India repo).
#
# Only two things changed vs your current file:
#   1. added the "Build static site data" step (runs build_data.py → stockradar-web/public/data/*.json)
#   2. added  stockradar-web/public/data/  to the `git add` line
# Everything else is your workflow, untouched.

name: Daily Data Update

on:
  schedule:
    - cron: '0 12 * * 1-5'   # 5:30 PM IST, Mon-Fri
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements-scripts.txt

      - name: Run daily pipeline
        working-directory: scripts
        run: python run_daily.py
        timeout-minutes: 90

      # ── NEW: build the static JSON the website reads (reuses scoring/insights/screens/history) ──
      - name: Build static site data
        env:
          STOCKRADAR_REPO: ${{ github.workspace }}   # repo root has the modules + data/
        run: python stockradar-web/scripts/build_data.py

      # append today's FII/DII to the rolling archive (never fails the run)
      - name: Archive FII/DII
        run: python stockradar-web/scripts/fetch_fiidii.py
        continue-on-error: true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/technicals.csv data/indices_technicals.csv data/global_technicals.csv data/history/ stockradar-web/public/data/
          git diff --staged --quiet || git commit -m "Daily data update $(date -u +%Y-%m-%d)"
          git pull --rebase
          git push
